<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walk Artwork</title>

  <style>
    body {
      background-color: #d6ecff;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    .wrapper {
      background-color: #87CEEB;
      padding: 20px;
      border-radius: 8px;
      width: 900px;
      margin: auto;
    }

    h1 {
      color: black;
    }

    a {
      color: black;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      height: auto;
      margin-top: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <h1>Walk Artwork</h1>

    <picture>
      <source srcset="images/walk.svg" type="image/svg+xml">
      <img src="images/walk.png" alt="Walk artwork">
    </picture>

    <p><a href="index.html">Back to Main Page</a></p>
  </div>
</body>

</html>
