<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flint Artwork</title>

  <style>
    body {
      background-color: #d6ecff;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    .wrapper {
      width: 900px;
      margin: auto;
      background-color: #87CEEB;
      padding: 20px;
      border-radius: 8px;
    }

    h1 {
      color: black;
    }

    a {
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-top: 20px;
    }

    nav {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <h1>Flint Artwork</h1>

    <picture>
      <source srcset="images/flint.svg" type="image/svg+xml">
      <img src="images/flint.png" alt="Flint artwork">
    </picture>

    <nav>
      <a href="index.html">Back to Main Page</a>
    </nav>
  </div>

</body>
</html>
